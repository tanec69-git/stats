<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Transformation Explorer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        text-align: center;
        padding: 12px;
    }
    .card {
        background: white;
        padding: 16px;
        border-radius: 12px;
        max-width: 420px;
        margin: auto;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 { margin-bottom: 10px; }
    .slider-container {
        margin: 12px 0;
    }
    input[type=range] {
        width: 100%;
    }
    .data {
        font-weight: bold;
        margin: 8px 0;
        word-wrap: break-word;
    }
</style>
</head>
<body>

<div class="card">
    <h2>📊 Transform Your Data</h2>

    <p><strong>Original:</strong></p>
    <div class="data" id="original"></div>

    <div class="slider-container">
        <label>Multiply (k): <span id="kVal">1</span></label>
        <input type="range" id="mult" min="-3" max="3" step="0.1" value="1">
    </div>

    <div class="slider-container">
        <label>Add (c): <span id="cVal">0</span></label>
        <input type="range" id="add" min="-20" max="20" step="1" value="0">
    </div>

    <p><strong>New Data:</strong></p>
    <div class="data" id="newData"></div>

    <p>Mean: <span id="mean"></span></p>
    <p>SD: <span id="sd"></span></p>

    <canvas id="chart"></canvas>
</div>

<script>
const originalData = [5, 10, 15, 20, 25];

function mean(arr) {
    return arr.reduce((a, b) => a + b, 0) / arr.length;
}

function sd(arr) {
    const m = mean(arr);
    return Math.sqrt(arr.reduce((sum, x) => sum + (x - m) ** 2, 0) / arr.length);
}

// Chart setup
const ctx = document.getElementById('chart');
const chart = new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ["1","2","3","4","5"],
        datasets: [{
            label: 'Transformed Data',
            data: originalData,
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: { beginAtZero: true }
        }
    }
});

function update() {
    const k = parseFloat(document.getElementById("mult").value);
    const c = parseFloat(document.getElementById("add").value);

    document.getElementById("kVal").innerText = k;
    document.getElementById("cVal").innerText = c;

    const newData = originalData.map(x => x * k + c);

    document.getElementById("newData").innerText = newData.map(x => x.toFixed(1)).join(", ");
    document.getElementById("mean").innerText = mean(newData).toFixed(2);
    document.getElementById("sd").innerText = sd(newData).toFixed(2);

    chart.data.datasets[0].data = newData;
    chart.update();
}

// Initial display
document.getElementById("original").innerText = originalData.join(", ");
document.getElementById("mult").addEventListener("input", update);
document.getElementById("add").addEventListener("input", update);

update();
</script>

</body>
</html>
