<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypothesis Testing Calculator</title>
    <!-- Include Chart.js for visualization and jStat for statistical functions -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jstat/1.9.6/jstat.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            display: flex;
            flex-direction: row;
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
        }

        .panel {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .controls {
            flex: 1;
            min-width: 300px;
        }

        .visualization {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h2 { margin-top: 0; margin-bottom: 1.5rem; font-size: 1.25rem; }

        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            background: var(--bg-color);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .result-item { display: flex; flex-direction: column; }
        .result-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .result-value { font-size: 1.25rem; font-weight: 600; }
        
        .conclusion {
            grid-column: span 2;
            text-align: center;
            padding: 1rem;
            font-size: 1.25rem;
            font-weight: 700;
            border-radius: 6px;
            margin-top: 0.5rem;
        }

        .reject { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .fail-reject { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }

        @media (max-width: 800px) {
            .container { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Input Panel -->
    <div class="panel controls">
        <h2>Parameters</h2>
        
        <div class="form-group">
            <label>Null Hypothesis Mean (H₀)</label>
            <input type="number" id="mu" value="100" step="any">
        </div>
        
        <div class="form-group">
            <label>Sample Mean (x̄)</label>
            <input type="number" id="xbar" value="108" step="any">
        </div>
        
        <div class="form-group">
            <label>Std Dev (σ or s)</label>
            <input type="number" id="std" value="15" step="any" min="0.0001">
        </div>
        
        <div class="form-group">
            <label>Sample Size (n)</label>
            <input type="number" id="n" value="25" step="1" min="2">
        </div>
        
        <div class="form-group">
            <label>Significance Level (α)</label>
            <input type="number" id="alpha" value="0.05" step="0.01" min="0.001" max="0.999">
        </div>
        
        <div class="form-group">
            <label>Alternative Hypothesis (H₁)</label>
            <select id="alt">
                <option value="right">Right-tailed (>)</option>
                <option value="left">Left-tailed (<)</option>
                <option value="two">Two-tailed (≠)</option>
            </select>
        </div>
    </div>

    <!-- Output & Visualization Panel -->
    <div class="panel visualization">
        <h2>Distribution & Results</h2>
        
        <div class="chart-container">
            <canvas id="distChart"></canvas>
        </div>

        <div class="results-grid">
            <div class="result-item">
                <span class="result-label">Distribution Used</span>
                <span class="result-value" id="res-dist">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Test Statistic</span>
                <span class="result-value" id="res-stat">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Critical Value(s)</span>
                <span class="result-value" id="res-crit">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">P-Value</span>
                <span class="result-value" id="res-pval">-</span>
            </div>
            <div id="res-conclusion" class="conclusion">
                -
            </div>
        </div>
    </div>
</div>

<script>
    let chartInstance = null;

    // Grab input elements
    const inputs = ['mu', 'xbar', 'std', 'n', 'alpha', 'alt'].map(id => document.getElementById(id));
    
    // Add event listeners to recalculate whenever an input changes
    inputs.forEach(el => el.addEventListener('input', calculateAndPlot));

    function calculateAndPlot() {
        // 1. Get Values
        const mu = parseFloat(document.getElementById('mu').value);
        const xbar = parseFloat(document.getElementById('xbar').value);
        const std = parseFloat(document.getElementById('std').value);
        const n = parseInt(document.getElementById('n').value);
        const alpha = parseFloat(document.getElementById('alpha').value);
        const alt = document.getElementById('alt').value;

        if (isNaN(mu) || isNaN(xbar) || isNaN(std) || isNaN(n) || isNaN(alpha) || n < 2 || std <= 0) return;

        // 2. Math Calculations
        const df = n - 1;
        const isTDist = n < 30;
        const se = std / Math.sqrt(n);
        const stat = (xbar - mu) / se;
        
        let critValLow = null;
        let critValHigh = null;
        let pValue = 0;

        if (isTDist) {
            if (alt === 'left') {
                critValLow = jStat.studentt.inv(alpha, df);
                pValue = jStat.studentt.cdf(stat, df);
            } else if (alt === 'right') {
                critValHigh = jStat.studentt.inv(1 - alpha, df);
                pValue = 1 - jStat.studentt.cdf(stat, df);
            } else {
                critValLow = jStat.studentt.inv(alpha / 2, df);
                critValHigh = jStat.studentt.inv(1 - alpha / 2, df);
                pValue = 2 * Math.min(jStat.studentt.cdf(stat, df), 1 - jStat.studentt.cdf(stat, df));
            }
        } else {
            if (alt === 'left') {
                critValLow = jStat.normal.inv(alpha, 0, 1);
                pValue = jStat.normal.cdf(stat, 0, 1);
            } else if (alt === 'right') {
                critValHigh = jStat.normal.inv(1 - alpha, 0, 1);
                pValue = 1 - jStat.normal.cdf(stat, 0, 1);
            } else {
                critValLow = jStat.normal.inv(alpha / 2, 0, 1);
                critValHigh = jStat.normal.inv(1 - alpha / 2, 0, 1);
                pValue = 2 * Math.min(jStat.normal.cdf(stat, 0, 1), 1 - jStat.normal.cdf(stat, 0, 1));
            }
        }

        // 3. Update DOM Results
        document.getElementById('res-dist').innerText = isTDist ? `t-Test (df = ${df})` : `Z-Test`;
        document.getElementById('res-stat').innerText = `${isTDist ? 't' : 'z'} = ${stat.toFixed(3)}`;
        
        if (alt === 'two') {
            document.getElementById('res-crit').innerText = `±${critValHigh.toFixed(3)}`;
        } else if (alt === 'left') {
            document.getElementById('res-crit').innerText = `${critValLow.toFixed(3)}`;
        } else {
            document.getElementById('res-crit').innerText = `${critValHigh.toFixed(3)}`;
        }

        document.getElementById('res-pval').innerText = pValue < 0.0001 ? '< 0.0001' : pValue.toFixed(4);

        const conclusionEl = document.getElementById('res-conclusion');
        if (pValue <= alpha) {
            conclusionEl.innerText = "Reject the Null Hypothesis";
            conclusionEl.className = "conclusion reject";
        } else {
            conclusionEl.innerText = "Fail to Reject the Null Hypothesis";
            conclusionEl.className = "conclusion fail-reject";
        }

        // 4. Generate Chart Data (Using absolute X/Y points for linear scale)
        const curveData = [];
        const shadeData = [];
        const maxRange = Math.max(4, Math.ceil(Math.abs(stat)) + 1);
        const step = 0.01; // Fine resolution for smoothness without tension

        for (let i = -maxRange; i <= maxRange + step; i += step) {
            const x = Math.round(i * 100) / 100;
            
            let y = 0;
            if (isTDist) {
                y = jStat.studentt.pdf(x, df);
            } else {
                y = jStat.normal.pdf(x, 0, 1);
            }
            curveData.push({x: x, y: y});

            let inRejection = false;
            if (alt === 'left' && x <= critValLow) inRejection = true;
            if (alt === 'right' && x >= critValHigh) inRejection = true;
            if (alt === 'two' && (x <= critValLow || x >= critValHigh)) inRejection = true;

            shadeData.push({x: x, y: inRejection ? y : 0});
        }

        updateChart(curveData, shadeData, stat, isTDist ? 't' : 'z');
    }

    function updateChart(curveData, shadeData, stat, statLabel) {
        const ctx = document.getElementById('distChart').getContext('2d');
        
        if (chartInstance) {
            chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [
                    {
                        label: 'Test Statistic',
                        // Exact precision plotting using X/Y coordinates
                        data: [{x: stat, y: 0}], 
                        type: 'scatter',
                        pointBackgroundColor: '#3b82f6', // Blue
                        pointBorderColor: '#ffffff',
                        pointRadius: 7,
                        pointHoverRadius: 9,
                        showLine: false,
                        order: 0
                    },
                    {
                        label: 'Distribution Curve',
                        data: curveData,
                        borderColor: '#0f172a', // Dark Slate
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false,
                        tension: 0, // Set to 0 to prevent "S" slanting at boundaries
                        order: 2
                    },
                    {
                        label: 'Rejection Region (α)',
                        data: shadeData,
                        backgroundColor: 'rgba(252, 165, 165, 0.6)', // Light Red
                        borderColor: 'transparent',
                        borderWidth: 0,
                        pointRadius: 0,
                        fill: 'origin',
                        tension: 0, // Set to 0 to make drop-offs perfectly vertical
                        order: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { position: 'bottom' },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                if (context.dataset.label === 'Test Statistic') {
                                    return `${statLabel} = ${stat.toFixed(3)}`;
                                }
                                return null;
                            },
                            title: () => null // Hide default title
                        }
                    }
                },
                scales: {
                    x: {
                        type: 'linear', // Treat X-axis as true mathematical numbers
                        title: { display: true, text: 'Standard Deviations (Z / t score)', font: { weight: 'bold' } },
                        grid: { display: false }
                    },
                    y: {
                        display: false,
                        beginAtZero: true
                    }
                }
            }
        });
    }

    // Initialize on first load
    calculateAndPlot();
</script>

</body>
</html>
