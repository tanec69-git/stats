<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Product Rule Generator</title>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(','\\)']],
        displayMath: [['\\[','\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <style>

    body{
      margin:0;
      padding:20px;
      font-family:Arial, sans-serif;
      background:#f4f6f9;
      display:flex;
      justify-content:center;
    }

    .container{
      width:1000px;
      max-width:95%;
      background:white;
      padding:30px;
      border-radius:18px;
      box-shadow:0 6px 18px rgba(0,0,0,0.15);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#222;
    }

    .card{
      background:#fafafa;
      border:1px solid #ddd;
      border-radius:14px;
      padding:20px;
      margin-top:20px;
    }

    .label{
      font-size:22px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .math{
      font-size:30px;
      margin:18px 0;
      overflow-x:auto;
    }

    .solution{
      font-size:20px;
      line-height:1.9;
    }

    .step{
      margin-top:15px;
    }

    .answer{
      margin-top:20px;
      background:#e0f2fe;
      padding:18px;
      border-radius:12px;
      font-weight:bold;
    }

    button{
      background:#2563eb;
      color:white;
      border:none;
      padding:14px 22px;
      border-radius:12px;
      font-size:18px;
      cursor:pointer;
      margin-right:10px;
      margin-top:10px;
      transition:0.2s;
    }

    button:hover{
      background:#1d4ed8;
      transform:scale(1.03);
    }

    .hidden{
      display:none;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>Product Rule Generator</h1>

  <button onclick="generateProblem()">Generate Problem</button>
  <button onclick="toggleSolution()">Show / Hide Solution</button>

  <div class="card">
    <div class="label">Generated Question</div>
    <div id="question" class="math"></div>
  </div>

  <div id="solutionCard" class="card hidden">
    <div class="label">Solution</div>
    <div id="solution" class="solution"></div>
  </div>

</div>

<script>

function randInt(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

// ========================================
// Remove coefficient 1
// ========================================

function coeff(n){

  if(n === 1){
    return "";
  }

  if(n === -1){
    return "-";
  }

  return n;
}

// ========================================
// Remove exponent 1
// ========================================

function powerString(power){

  if(power === 1){
    return "";
  }

  return `^{${power}}`;
}

// ========================================
// Exponential string
// ========================================

function expString(coefficient){

  if(coefficient === 1){
    return "x";
  }

  return `${coefficient}x`;
}

// ========================================
// Generate Problem
// ========================================

function generateProblem(){

  const type = randInt(1,4);

  let questionLatex = "";
  let solutionLatex = "";

  // ==================================================
  // TYPE 1
  // Polynomial × Exponential
  // ==================================================

  if(type === 1){

    const a = randInt(2,6);
    const power = randInt(2,5);
    const c = randInt(1,9);

    const b = randInt(1,5);

    const exponent = expString(b);

    questionLatex =
      `f(x)=
      (${coeff(a)}x${powerString(power)}+${c})
      (e^{${exponent}})`;

    solutionLatex = `

      <div class="step">
      Let
      \\[
      u=${coeff(a)}x${powerString(power)}+${c}
      \\]
      and
      \\[
      v=e^{${exponent}}
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{du}{dx}
      =
      ${coeff(a*power)}x${powerString(power-1)}
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{dv}{dx}
      =
      ${b === 1 ? "" : b}e^{${exponent}}
      \\]
      </div>

      <div class="step">
      Apply the product rule:
      </div>

      <div class="math">
      \\[
      \\frac{d}{dx}(uv)
      =
      u\\frac{dv}{dx}
      +
      v\\frac{du}{dx}
      \\]
      </div>

      <div class="answer">

      Step 1:

      <div class="math">
      \\[
      f'(x)
      =
      (${coeff(a)}x${powerString(power)}+${c})
      (${b === 1 ? "" : b}e^{${exponent}})
      +
      (e^{${exponent}})
      (${coeff(a*power)}x${powerString(power-1)})
      \\]
      </div>

      Step 2: Expand

      <div class="math">
      \\[
      f'(x)
      =
      ${coeff(a*b)}x${powerString(power)}e^{${exponent}}
      +
      ${c*b === 1 ? "" : c*b}e^{${exponent}}
      +
      ${coeff(a*power)}x${powerString(power-1)}e^{${exponent}}
      \\]
      </div>

      </div>
    `;
  }

  // ==================================================
  // TYPE 2
  // Polynomial × ln(x)
  // ==================================================

  else if(type === 2){

    const a = randInt(2,6);
    const power = randInt(2,5);
    const c = randInt(1,9);

    const b = randInt(1,5);

    questionLatex =
      `f(x)=
      (${coeff(a)}x${powerString(power)}+${c})
      (\\ln(${coeff(b)}x))`;

    solutionLatex = `

      <div class="step">
      Let
      \\[
      u=${coeff(a)}x${powerString(power)}+${c}
      \\]
      and
      \\[
      v=\\ln(${coeff(b)}x)
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{du}{dx}
      =
      ${coeff(a*power)}x${powerString(power-1)}
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{dv}{dx}
      =
      \\frac{1}{x}
      \\]
      </div>

      <div class="step">
      Apply the product rule:
      </div>

      <div class="math">
      \\[
      \\frac{d}{dx}(uv)
      =
      u\\frac{dv}{dx}
      +
      v\\frac{du}{dx}
      \\]
      </div>

      <div class="answer">

      Step 1:

      <div class="math">
      \\[
      f'(x)
      =
      (${coeff(a)}x${powerString(power)}+${c})
      \\left(
      \\frac{1}{x}
      \\right)
      +
      (\\ln(${coeff(b)}x))
      (${coeff(a*power)}x${powerString(power-1)})
      \\]
      </div>

      Step 2: Simplify

      <div class="math">
      \\[
      f'(x)
      =
      ${coeff(a)}x${powerString(power-1)}
      +
      \\frac{${c}}{x}
      +
      ${coeff(a*power)}x${powerString(power-1)}
      \\ln(${coeff(b)}x)
      \\]
      </div>

      </div>
    `;
  }

  // ==================================================
  // TYPE 3
  // Exponential × ln(x)
  // ==================================================

  else if(type === 3){

    const a = randInt(1,5);
    const b = randInt(1,5);

    const exponent = expString(a);

    questionLatex =
      `f(x)=
      (e^{${exponent}})
      (\\ln(${coeff(b)}x))`;

    solutionLatex = `

      <div class="step">
      Let
      \\[
      u=e^{${exponent}}
      \\]
      and
      \\[
      v=\\ln(${coeff(b)}x)
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{du}{dx}
      =
      ${a === 1 ? "" : a}e^{${exponent}}
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{dv}{dx}
      =
      \\frac{1}{x}
      \\]
      </div>

      <div class="step">
      Apply the product rule:
      </div>

      <div class="math">
      \\[
      \\frac{d}{dx}(uv)
      =
      u\\frac{dv}{dx}
      +
      v\\frac{du}{dx}
      \\]
      </div>

      <div class="answer">

      Step 1:

      <div class="math">
      \\[
      f'(x)
      =
      (e^{${exponent}})
      \\left(
      \\frac{1}{x}
      \\right)
      +
      (\\ln(${coeff(b)}x))
      (${a === 1 ? "" : a}e^{${exponent}})
      \\]
      </div>

      Step 2: Simplify

      <div class="math">
      \\[
      f'(x)
      =
      \\frac{e^{${exponent}}}{x}
      +
      ${a === 1 ? "" : a}e^{${exponent}}
      \\ln(${coeff(b)}x)
      \\]
      </div>

      </div>
    `;
  }

  // ==================================================
  // TYPE 4
  // Exponential × Exponential
  // ==================================================

  else{

    const a = randInt(1,5);
    const b = randInt(1,5);

    const exp1 = expString(a);
    const exp2 = expString(b);

    questionLatex =
      `f(x)=
      (e^{${exp1}})
      (e^{${exp2}})`;

    solutionLatex = `

      <div class="step">
      Let
      \\[
      u=e^{${exp1}}
      \\]
      and
      \\[
      v=e^{${exp2}}
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{du}{dx}
      =
      ${a === 1 ? "" : a}e^{${exp1}}
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{dv}{dx}
      =
      ${b === 1 ? "" : b}e^{${exp2}}
      \\]
      </div>

      <div class="step">
      Apply the product rule:
      </div>

      <div class="math">
      \\[
      \\frac{d}{dx}(uv)
      =
      u\\frac{dv}{dx}
      +
      v\\frac{du}{dx}
      \\]
      </div>

      <div class="answer">

      Step 1:

      <div class="math">
      \\[
      f'(x)
      =
      (e^{${exp1}})
      (${b === 1 ? "" : b}e^{${exp2}})
      +
      (e^{${exp2}})
      (${a === 1 ? "" : a}e^{${exp1}})
      \\]
      </div>

      Step 2: Simplify

      <div class="math">
      \\[
      f'(x)
      =
      ${a+b === 1 ? "" : a+b}
      e^{${a+b}x}
      \\]
      </div>

      </div>
    `;
  }

  document.getElementById("question").innerHTML =
    `\\[ ${questionLatex} \\]`;

  document.getElementById("solution").innerHTML =
    solutionLatex;

  document.getElementById("solutionCard")
    .classList.add("hidden");

  MathJax.typesetPromise();
}

function toggleSolution(){

  document.getElementById("solutionCard")
    .classList.toggle("hidden");

  MathJax.typesetPromise();
}

generateProblem();

</script>

</body>
</html>
