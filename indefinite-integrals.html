
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Indefinite Integrals Solver</title>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(','\\)']],
        displayMath: [['\\[','\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>

  <script defer
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
  </script>

  <style>

    body{
      margin:0;
      padding:30px;
      font-family:Arial, sans-serif;
      background:#f4f7fb;
      display:flex;
      justify-content:center;
    }

    .container{
      width:950px;
      max-width:100%;
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 6px 20px rgba(0,0,0,0.12);
    }

    h1{
      text-align:center;
      color:#1d4ed8;
      margin-bottom:10px;
    }

    .subtitle{
      text-align:center;
      color:#666;
      margin-bottom:30px;
    }

    .question-box{
      background:#eef4ff;
      border-left:8px solid #2563eb;
      padding:25px;
      border-radius:15px;
      font-size:30px;
      text-align:center;
      margin-bottom:25px;
      min-height:90px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
      margin-bottom:25px;
    }

    button{
      padding:14px 24px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      transition:0.2s;
    }

    .generate-btn{
      background:#2563eb;
      color:white;
    }

    .generate-btn:hover{
      background:#1d4ed8;
    }

    .solution-btn{
      background:#16a34a;
      color:white;
    }

    .solution-btn:hover{
      background:#15803d;
    }

    .solution-area{
      background:#fafafa;
      border:2px solid #ddd;
      border-radius:16px;
      padding:25px;
      min-height:150px;
    }

    .step{
      margin-bottom:35px;
      font-size:24px;
      line-height:2;
    }

    .step-title{
      color:#1d4ed8;
      font-weight:bold;
      margin-bottom:10px;
    }

    .final-answer{
      background:#fef9c3;
      border-left:8px solid #eab308;
      padding:20px;
      border-radius:14px;
      font-size:26px;
      margin-top:20px;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>Indefinite Integrals Solver</h1>

  <div class="subtitle">
    Practice the Power Rule with square roots and fractional indices
  </div>

  <div class="question-box" id="questionBox">
    Press Generate Question
  </div>

  <div class="buttons">

    <button class="generate-btn" onclick="generateQuestion()">
      Generate Question
    </button>

    <button class="solution-btn" onclick="showSolution()">
      Show Solution
    </button>

  </div>

  <div class="solution-area" id="solutionArea">
    Solution steps will appear here.
  </div>

</div>

<script>

let currentQuestion = null;

function randomInt(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function simplifyFraction(numerator, denominator){

  function gcd(a,b){
    return b ? gcd(b, a % b) : a;
  }

  const g = gcd(Math.abs(numerator), Math.abs(denominator));

  return {
    numerator: numerator / g,
    denominator: denominator / g
  };
}

function frac(num, den){

  if(den === 1){
    return `${num}`;
  }

  return `\\frac{${num}}{${den}}`;
}

function powerLatex(num, den){

  if(den === 1){

    if(num === 1){
      return "x";
    }

    return `x^{${num}}`;
  }

  return `x^{${frac(num,den)}}`;
}

function generateQuestion(){

  const coefficient = randomInt(2,9);

  const type = randomInt(1,3);

  let question = "";

  let numerator;
  let denominator;

  // NORMAL POWER
  if(type === 1){

    numerator = randomInt(1,6);
    denominator = 1;

    if(numerator === 1){

      question =
        `\\int ${coefficient}x\\,dx`;

    }else{

      question =
        `\\int ${coefficient}x^{${numerator}}\\,dx`;
    }
  }

  // SQRT IN NUMERATOR
  else if(type === 2){

    const n = randomInt(1,7);

    numerator = n;
    denominator = 2;

    if(n === 1){

      question =
        `\\int ${coefficient}\\sqrt{x}\\,dx`;

    }else{

      question =
        `\\int ${coefficient}\\sqrt{x^{${n}}}\\,dx`;
    }
  }

  // SQRT IN DENOMINATOR
  else{

    const n = randomInt(1,7);

    numerator = -n;
    denominator = 2;

    if(n === 1){

      question =
        `\\int \\frac{${coefficient}}{\\sqrt{x}}\\,dx`;

    }else{

      question =
        `\\int \\frac{${coefficient}}{\\sqrt{x^{${n}}}}\\,dx`;
    }
  }

  currentQuestion = {
    coefficient,
    numerator,
    denominator,
    question
  };

  document.getElementById("questionBox").innerHTML =
    `\\(${question}\\)`;

  document.getElementById("solutionArea").innerHTML =
    "Solution steps will appear here.";

  MathJax.typesetPromise();
}

function showSolution(){

  if(!currentQuestion){
    return;
  }

  const a = currentQuestion.coefficient;
  const nNum = currentQuestion.numerator;
  const nDen = currentQuestion.denominator;

  // new power
  const top = nNum + nDen;
  const bottom = nDen;

  const newPower =
    simplifyFraction(top, bottom);

  // coefficient
  const coeff =
    simplifyFraction(
      a * newPower.denominator,
      newPower.numerator
    );

  let html = "";

  // STEP 1
  html += `
    <div class="step">

      <div class="step-title">
        Step 1: Rewrite using fractional indices
      </div>

      \\[
      ${currentQuestion.question}
      \\]

      \\[
      =
      \\int ${a}${powerLatex(nNum,nDen)}\\,dx
      \\]

    </div>
  `;

  // STEP 2
  html += `
    <div class="step">

      <div class="step-title">
        Step 2: Apply the Power Rule
      </div>

      \\[
      \\int x^n\\,dx
      =
      \\frac{x^{n+1}}{n+1} + c
      \\]

    </div>
  `;

  // STEP 3
  html += `
    <div class="step">

      <div class="step-title">
        Step 3: Increase the power by 1
      </div>

      \\[
      ${frac(nNum,nDen)}
      + 1
      =
      ${frac(top,bottom)}
      \\]

    </div>
  `;

  // STEP 4
  html += `
    <div class="step">

      <div class="step-title">
        Step 4: Divide by the new power
      </div>

      \\[
      =
      ${frac(coeff.numerator, coeff.denominator)}
      x^{
      ${frac(newPower.numerator,newPower.denominator)}
      }
      + c
      \\]

    </div>
  `;

  // FINAL ANSWER
  html += `
    <div class="final-answer">

      <strong>Final Answer</strong>

      \\[
      =
      ${finalAnswer(
        coeff.numerator,
        coeff.denominator,
        newPower.numerator,
        newPower.denominator
      )}
      + c
      \\]

    </div>
  `;

  document.getElementById("solutionArea").innerHTML = html;

  MathJax.typesetPromise();
}

function finalAnswer(cNum, cDen, pNum, pDen){

  let coefficient = "";

  if(cDen === 1){
    coefficient = `${cNum}`;
  }
  else{
    coefficient = `\\frac{${cNum}}{${cDen}}`;
  }

  // x
  if(pNum === pDen){
    return `${coefficient}x`;
  }

  // square roots
  if(pDen === 2){

    // sqrt(x)
    if(pNum === 1){
      return `${coefficient}\\sqrt{x}`;
    }

    // sqrt(x^n)
    if(pNum > 1){
      return `${coefficient}\\sqrt{x^{${pNum}}}`;
    }

    // negative powers
    return `${coefficient}x^{${frac(pNum,pDen)}}`;
  }

  return `${coefficient}x^{${frac(pNum,pDen)}}`;
}

generateQuestion();

</script>

</body>
</html>
