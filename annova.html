<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynamic One-Way ANOVA Calculator</title>

  <style>

    body{
      font-family: Arial, sans-serif;
      margin:20px;
      background:#f4f4f4;
      color:#222;
    }

    .container{
      max-width:1300px;
      margin:auto;
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1,h2{
      text-align:center;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin:20px 0;
      background:white;
    }

    th, td{
      border:1px solid #999;
      padding:10px;
      text-align:center;
    }

    th{
      background:#e8e8e8;
    }

    input{
      width:80px;
      padding:5px;
      text-align:center;
      font-size:16px;
    }

    button{
      padding:10px 18px;
      margin:5px;
      font-size:15px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      color:white;
    }

    .blue{
      background:#007bff;
    }

    .green{
      background:#28a745;
    }

    .red{
      background:#dc3545;
    }

    button:hover{
      opacity:0.9;
    }

    .controls{
      text-align:center;
      margin-bottom:20px;
    }

    .result-box{
      background:#fafafa;
      border:1px solid #ccc;
      padding:20px;
      border-radius:10px;
      margin-top:20px;
    }

    .formula{
      background:#f0f7ff;
      padding:12px;
      border-left:5px solid #007bff;
      margin:10px 0;
      overflow-x:auto;
      font-size:18px;
      line-height:1.7;
    }

    .highlight{
      font-weight:bold;
      color:#c0392b;
      font-size:22px;
    }

    .section-title{
      margin-top:40px;
      padding-bottom:5px;
      border-bottom:3px solid #007bff;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Dynamic One-Way ANOVA Calculator</h1>

  <p>
    Add or remove rows and columns to create your own ANOVA dataset.
  </p>

  <div class="controls">

    <button class="green" onclick="addColumn()">+ Add Column</button>

    <button class="red" onclick="removeColumn()">− Remove Column</button>

    <button class="green" onclick="addRow()">+ Add Row</button>

    <button class="red" onclick="removeRow()">− Remove Row</button>

    <button class="blue" onclick="calculateANOVA()">Calculate ANOVA</button>

  </div>

  <table id="dataTable">
    <thead>
      <tr id="headerRow">
        <th>Campaign 1</th>
        <th>Campaign 2</th>
        <th>Campaign 3</th>
      </tr>
    </thead>

    <tbody id="tableBody">

      <tr>
        <td><input type="number" value="22"></td>
        <td><input type="number" value="25"></td>
        <td><input type="number" value="29"></td>
      </tr>

      <tr>
        <td><input type="number" value="23"></td>
        <td><input type="number" value="22"></td>
        <td><input type="number" value="28"></td>
      </tr>

      <tr>
        <td><input type="number" value="21"></td>
        <td><input type="number" value="24"></td>
        <td><input type="number" value="31"></td>
      </tr>

    </tbody>
  </table>

  <div id="results"></div>

</div>

<script>

function addColumn(){

  const headerRow = document.getElementById("headerRow");

  const colCount = headerRow.children.length;

  const th = document.createElement("th");

  th.textContent = "Campaign " + (colCount + 1);

  headerRow.appendChild(th);

  const rows = document.querySelectorAll("#tableBody tr");

  rows.forEach(row => {

    const td = document.createElement("td");

    td.innerHTML = `<input type="number" value="0">`;

    row.appendChild(td);

  });

}

function removeColumn(){

  const headerRow = document.getElementById("headerRow");

  if(headerRow.children.length <= 2){
    alert("At least 2 columns are required.");
    return;
  }

  headerRow.removeChild(headerRow.lastElementChild);

  const rows = document.querySelectorAll("#tableBody tr");

  rows.forEach(row => {

    row.removeChild(row.lastElementChild);

  });

}

function addRow(){

  const colCount =
    document.getElementById("headerRow").children.length;

  const tr = document.createElement("tr");

  for(let i=0; i<colCount; i++){

    const td = document.createElement("td");

    td.innerHTML = `<input type="number" value="0">`;

    tr.appendChild(td);

  }

  document.getElementById("tableBody").appendChild(tr);

}

function removeRow(){

  const tbody = document.getElementById("tableBody");

  if(tbody.children.length <= 2){
    alert("At least 2 rows are required.");
    return;
  }

  tbody.removeChild(tbody.lastElementChild);

}

function mean(arr){

  return arr.reduce((a,b)=>a+b,0) / arr.length;

}

function calculateANOVA(){

  const rows =
    document.querySelectorAll("#tableBody tr");

  const colCount =
    document.getElementById("headerRow").children.length;

  let groups = [];

  for(let c=0; c<colCount; c++){

    let group = [];

    rows.forEach(row => {

      const value =
        parseFloat(
          row.children[c].querySelector("input").value
        );

      group.push(value);

    });

    groups.push(group);

  }

  const allData = groups.flat();

  const grandMean = mean(allData);

  const groupMeans = groups.map(g => mean(g));

  // ---------- SSTotal ----------

  let SSTotal = 0;

  let ssTotalRows = "";

  allData.forEach(x => {

    const val = (x - grandMean) ** 2;

    SSTotal += val;

    ssTotalRows += `
      <tr>
        <td>${x}</td>
        <td>${grandMean.toFixed(3)}</td>
        <td>(${x} - ${grandMean.toFixed(3)})²</td>
        <td>${val.toFixed(3)}</td>
      </tr>
    `;

  });

  // ---------- SSE ----------

  let SSE = 0;

  let SSERows = "";

  groups.forEach((group,index) => {

    const m = groupMeans[index];

    group.forEach(x => {

      const val = (x - m) ** 2;

      SSE += val;

      SSERows += `
        <tr>
          <td>Campaign ${index+1}</td>
          <td>${x}</td>
          <td>${m.toFixed(3)}</td>
          <td>(${x} - ${m.toFixed(3)})²</td>
          <td>${val.toFixed(3)}</td>
        </tr>
      `;

    });

  });

  // ---------- SSTreatment ----------

  const SSTreatment = SSTotal - SSE;

  // ---------- F Statistic ----------

  const k = groups.length;

  const N = allData.length;

  const dfTreatment = k - 1;

  const dfError = N - k;

  const MSTreatment = SSTreatment / dfTreatment;

  const MSE = SSE / dfError;

  const F = MSTreatment / MSE;

  // ---------- Means Table ----------

  let meansRows = "";

  groupMeans.forEach((m,index)=>{

    meansRows += `
      <tr>
        <td>Campaign ${index+1}</td>
        <td>${m.toFixed(3)}</td>
      </tr>
    `;

  });

  // ---------- Output ----------

  document.getElementById("results").innerHTML = `

    <div class="result-box">

      <h2 class="section-title">Step 1: Means</h2>

      <table>

        <tr>
          <th>Group</th>
          <th>Mean</th>
        </tr>

        ${meansRows}

        <tr>
          <th>Grand Mean</th>
          <th>${grandMean.toFixed(3)}</th>
        </tr>

      </table>

      <h2 class="section-title">Step 2: SSTotal</h2>

      <div class="formula">

        <strong>SSTotal Formula:</strong><br>

        SSTotal = Σ(x − x̄)²

      </div>

      <table>

        <tr>
          <th>x</th>
          <th>Grand Mean</th>
          <th>Calculation</th>
          <th>Value</th>
        </tr>

        ${ssTotalRows}

        <tr>
          <th colspan="3">SSTotal</th>
          <th>${SSTotal.toFixed(3)}</th>
        </tr>

      </table>

      <h2 class="section-title">Step 3: SSE</h2>

      <div class="formula">

        <strong>SSE Formula:</strong><br>

        SSE = Σ(x − x̄ᵢ)²

      </div>

      <table>

        <tr>
          <th>Group</th>
          <th>x</th>
          <th>Group Mean</th>
          <th>Calculation</th>
          <th>Value</th>
        </tr>

        ${SSERows}

        <tr>
          <th colspan="4">SSE</th>
          <th>${SSE.toFixed(3)}</th>
        </tr>

      </table>

      <h2 class="section-title">Step 4: SSTreatment</h2>

      <div class="formula">

        <strong>Formula:</strong><br><br>

        SSTreatment = SSTotal − SSE<br><br>

        = ${SSTotal.toFixed(3)} − ${SSE.toFixed(3)}<br><br>

        = <span class="highlight">${SSTreatment.toFixed(3)}</span>

      </div>

      <h2 class="section-title">Step 5: F Test Statistic</h2>

      <div class="formula">

        <strong>Formula:</strong><br>

        F = MSTreatment / MSE

      </div>

      <table>

        <tr>
          <th>Source</th>
          <th>SS</th>
          <th>df</th>
          <th>MS</th>
        </tr>

        <tr>
          <td>Treatment</td>
          <td>${SSTreatment.toFixed(3)}</td>
          <td>${dfTreatment}</td>
          <td>${MSTreatment.toFixed(3)}</td>
        </tr>

        <tr>
          <td>Error</td>
          <td>${SSE.toFixed(3)}</td>
          <td>${dfError}</td>
          <td>${MSE.toFixed(3)}</td>
        </tr>

      </table>

      <div class="formula">

        F = MSTreatment / MSE<br><br>

        = ${MSTreatment.toFixed(3)} / ${MSE.toFixed(3)}<br><br>

        = <span class="highlight">${F.toFixed(3)}</span>

      </div>

    </div>

  `;

}

calculateANOVA();

</script>

</body>
</html>
