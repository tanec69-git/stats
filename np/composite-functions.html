<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Composite Function Generator</title>

  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>

  <script id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>

  <style>

    body{
      font-family: Arial, sans-serif;
      background:#f4f6f9;
      margin:0;
      padding:20px;
    }

    .container{
      max-width:1000px;
      margin:auto;
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      color:#1f4e79;
    }

    button{
      padding:12px 20px;
      font-size:16px;
      background:#1f77d0;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      margin-right:10px;
      margin-bottom:20px;
    }

    button:hover{
      background:#125ca3;
    }

    .box{
      background:#fafafa;
      border-left:5px solid #1f77d0;
      padding:20px;
      margin-top:20px;
      border-radius:8px;
    }

    .question{
      font-size:20px;
      margin-bottom:20px;
    }

    .answer{
      font-size:19px;
      line-height:2;
      display:none;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Composite Function Question Generator</h1>

  <button onclick="generateQuestion()">
    Generate Question
  </button>

  <button onclick="toggleAnswer()" id="toggleBtn">
    Show Answer
  </button>

  <div class="box">

    <div id="question" class="question"></div>

    <div id="answer" class="answer"></div>

  </div>

</div>

<script>

function randInt(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function generateQuestion(){

  document.getElementById("answer").style.display = "none";
  document.getElementById("toggleBtn").innerText = "Show Answer";

  const types = ["sqrt","linear","quadratic"];

  const fType = types[randInt(0,types.length-1)];

  let fLatex = "";
  let substitution = "";
  let fExpression = "";

  // Generate f(x)

  if(fType === "sqrt"){

    let a = randInt(1,8);

    fLatex = `\\sqrt{x-${a}}`;
    substitution = `\\sqrt{x-${a}}`;
    fExpression = `x-${a}`;
  }

  else if(fType === "linear"){

    let a = randInt(2,5);
    let b = randInt(1,9);

    fLatex = `${a}x+${b}`;
    substitution = `${a}x+${b}`;
    fExpression = `${a}x+${b}`;
  }

  else{

    let b = randInt(1,5);

    fLatex = `x^2+${b}`;
    substitution = `x^2+${b}`;
    fExpression = `x^2+${b}`;
  }

  // Generate g(x)

  const gType = randInt(1,3);

  let gLatex = "";
  let step3 = "";
  let step4 = "";

  // Reciprocal type

  if(gType === 1){

    let c = randInt(1,6);

    gLatex = `\\frac{1}{x^2+${c}}`;

    step3 = `\\frac{1}{(${substitution})^2+${c}}`;

    if(fType === "sqrt"){

      step4 = `\\frac{1}{${fExpression}+${c}}`;

      let value = parseInt(fExpression.match(/x-(\d+)/)[1]);

      let simplified = c - value;

      if(simplified > 0){
        step4 = `\\frac{1}{x+${simplified}}`;
      }
      else if(simplified < 0){
        step4 = `\\frac{1}{x${simplified}}`;
      }
      else{
        step4 = `\\frac{1}{x}`;
      }

    }

  }

  // Linear type

  else if(gType === 2){

    let c = randInt(2,8);

    gLatex = `3x+${c}`;

    step3 = `3(${substitution})+${c}`;

    if(fType === "linear"){

      let match = fExpression.match(/(\d+)x\+(\d+)/);

      let a = parseInt(match[1]);
      let b = parseInt(match[2]);

      let coeff = 3*a;
      let constant = 3*b+c;

      step4 = `${coeff}x+${constant}`;
    }

  }

  // Quadratic type

  else{

    let c = randInt(1,5);

    gLatex = `x^2+${c}`;

    step3 = `(${substitution})^2+${c}`;

    if(fType === "sqrt"){

      let value = parseInt(fExpression.match(/x-(\d+)/)[1]);

      let simplified = c - value;

      if(simplified > 0){
        step4 = `x+${simplified}`;
      }
      else if(simplified < 0){
        step4 = `x${simplified}`;
      }
      else{
        step4 = `x`;
      }

    }

  }

  // Display Question

  document.getElementById("question").innerHTML = `
    Determine the composite function \\(gf(x)\\) given that
    \\[
    f(x)=${fLatex}
    \\]

    and

    \\[
    g(x)=${gLatex}
    \\]
  `;

  // Display Answer

  let answerHTML = `
    \\[
    gf(x)=g[f(x)]
    \\]

    \\[
    =g(${substitution})
    \\]

    \\[
    =${step3}
    \\]
  `;

  if(step4 !== ""){

    answerHTML += `
      \\[
      =${step4}
      \\]
    `;
  }

  document.getElementById("answer").innerHTML = answerHTML;

  MathJax.typesetPromise();

}

function toggleAnswer(){

  const answer = document.getElementById("answer");
  const btn = document.getElementById("toggleBtn");

  if(answer.style.display === "none"){

    answer.style.display = "block";
    btn.innerText = "Hide Answer";
  }

  else{

    answer.style.display = "none";
    btn.innerText = "Show Answer";
  }

  MathJax.typesetPromise();
}

generateQuestion();

</script>

</body>
</html>
