<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Permutation App with Repeated Letters</title>

  <style>

    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      margin:20px;
    }

    .container{
      max-width:1100px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
    }

    label{
      display:block;
      margin-top:15px;
      font-weight:bold;
    }

    input{
      width:100%;
      padding:10px;
      font-size:16px;
      margin-top:5px;
      box-sizing:border-box;
    }

    button{
      margin-top:20px;
      padding:12px 20px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

    .section{
      margin-top:25px;
      background:#fafafa;
      padding:15px;
      border-radius:10px;
      border:1px solid #ddd;
    }

    .output{
      max-height:500px;
      overflow-y:auto;
      white-space:pre-wrap;
      font-family:monospace;
      background:white;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    .formula{
      line-height:1.9;
      font-size:18px;
    }

    .warning{
      color:red;
      font-weight:bold;
      margin-top:10px;
    }

    table{
      border-collapse:collapse;
      width:100%;
      margin-top:10px;
    }

    td,th{
      border:1px solid #ccc;
      padding:8px;
      text-align:center;
    }

    .math-box{
      background:white;
      padding:15px;
      border-radius:10px;
      border:1px solid #ccc;
      margin-top:15px;
      overflow-x:auto;
      font-size:20px;
    }

    .final-answer{
      font-size:30px;
      font-weight:bold;
      color:green;
      margin-top:20px;
      padding:15px;
      background:#eefbea;
      border-radius:10px;
      border:2px solid green;
      text-align:center;
    }

  </style>

</head>
<body>

<div class="container">

  <h1>Permutation App with Repeated Letters</h1>

  <label>Enter a Word</label>
  <input type="text"
         id="wordInput"
         placeholder="Example: HAPPY">

  <label>Maximum Number of Permutations to Display</label>
  <input type="number"
         id="maxDisplay"
         min="1"
         value="100">

  <button onclick="solve()">
    Generate Permutations
  </button>

  <div class="section">

    <h2>Letter Frequencies</h2>

    <div id="frequencyOutput"></div>

  </div>

  <div class="section">

    <h2>Mathematical Working</h2>

    <div id="reasoningOutput"
         class="formula"></div>

  </div>

  <div class="section">

    <h2>Permutations</h2>

    <div id="stats"></div>

    <div id="warning"
         class="warning"></div>

    <div id="permutationOutput"
         class="output"></div>

  </div>

</div>

<script>

function factorial(n){

  let result = 1;

  for(let i = 2; i <= n; i++){

    result *= i;
  }

  return result;
}

function getFrequencies(word){

  const freq = {};

  for(const letter of word){

    if(freq[letter]){

      freq[letter]++;

    }else{

      freq[letter] = 1;
    }
  }

  return freq;
}

function buildFormula(freqMap, n){

  let denominator = "";
  let denominatorValue = 1;

  const repeatedParts = [];

  for(const letter in freqMap){

    if(freqMap[letter] > 1){

      repeatedParts.push(freqMap[letter] + "!");

      denominatorValue *=
        factorial(freqMap[letter]);
    }
  }

  //------------------------------------
  // NO REPEATED LETTERS
  //------------------------------------

  if(repeatedParts.length === 0){

    return {
      formula: `${n}!`,
      expanded: `${factorial(n)}`,
      total: factorial(n)
    };
  }

  //------------------------------------
  // WITH REPEATED LETTERS
  //------------------------------------

  denominator =
    repeatedParts.join(" × ");

  const numerator =
    factorial(n);

  const total =
    numerator / denominatorValue;

  return {

    formula:
      `${n}! / (${denominator})`,

    expanded:
      `${numerator} / ${denominatorValue}`,

    total:
      total
  };
}

function solve(){

  const word =
    document.getElementById("wordInput")
    .value
    .trim()
    .toUpperCase();

  const maxDisplay =
    parseInt(
      document.getElementById("maxDisplay").value
    );

  const frequencyOutput =
    document.getElementById("frequencyOutput");

  const reasoningOutput =
    document.getElementById("reasoningOutput");

  const permutationOutput =
    document.getElementById("permutationOutput");

  const stats =
    document.getElementById("stats");

  const warning =
    document.getElementById("warning");

  //------------------------------------
  // RESET OUTPUTS
  //------------------------------------

  frequencyOutput.innerHTML = "";
  reasoningOutput.innerHTML = "";
  permutationOutput.textContent = "";
  stats.textContent = "";
  warning.textContent = "";

  //------------------------------------
  // VALIDATION
  //------------------------------------

  if(word.length === 0){

    warning.textContent =
      "Please enter a word.";

    return;
  }

  //------------------------------------
  // FREQUENCIES
  //------------------------------------

  const frequencies =
    getFrequencies(word);

  let freqHTML =
    "<table><tr><th>Letter</th><th>Frequency</th></tr>";

  for(const letter in frequencies){

    freqHTML += `
      <tr>
        <td>${letter}</td>
        <td>${frequencies[letter]}</td>
      </tr>
    `;
  }

  freqHTML += "</table>";

  frequencyOutput.innerHTML =
    freqHTML;

  //------------------------------------
  // FORMULA
  //------------------------------------

  const n = word.length;

  const formulaData =
    buildFormula(frequencies, n);

  //------------------------------------
  // GENERATE UNIQUE PERMUTATIONS
  //------------------------------------

  const results = new Set();

  function backtrack(path, freqMap){

    if(results.size >= maxDisplay){

      return;
    }

    if(path.length === word.length){

      results.add(path);

      return;
    }

    for(const letter in freqMap){

      if(freqMap[letter] > 0){

        freqMap[letter]--;

        backtrack(
          path + letter,
          freqMap
        );

        freqMap[letter]++;
      }
    }
  }

  backtrack("", {...frequencies});

  const resultArray =
    Array.from(results);

  //------------------------------------
  // DISPLAY PERMUTATIONS
  //------------------------------------

  permutationOutput.textContent =
    resultArray.join("\n");

  stats.innerHTML =
    `<strong>Displayed Permutations:</strong>
    ${resultArray.length}`;

  if(resultArray.length >= maxDisplay){

    warning.textContent =
      "Maximum display limit reached.";
  }

  //------------------------------------
  // DISPLAY MATHEMATICS
  //------------------------------------

  let html = "";

  html += `

    <strong>Word:</strong>
    ${word}

    <br><br>

    <strong>General Formula:</strong>

    <div class="math-box">

      Unique permutations

      <br><br>

      = n! / (a! × b! × c! ...)

    </div>

    <br>

    where repeated letters are divided out
    to avoid overcounting.

    <hr>

    <h2>Specific Formula for ${word}</h2>

    <div class="math-box">

      ${formulaData.formula}

    </div>

    <h2>Substitution</h2>

    <div class="math-box">

      = ${formulaData.expanded}

    </div>

    <h2>Final Answer</h2>

    <div class="math-box">

      = ${formulaData.total}

    </div>

    <div class="final-answer">

      Total Unique Permutations

      <br><br>

      ${formulaData.total}

    </div>
  `;

  //------------------------------------
  // EXTRA EXAMPLES
  //------------------------------------

  if(word === "ABCDE"){

    html += `

      <hr>

      <h2>Explanation</h2>

      ABCDE has no repeated letters.

      <br><br>

      Therefore:

      <div class="math-box">

        5!

        <br><br>

        = 120

      </div>
    `;
  }

  if(word === "HAPPY"){

    html += `

      <hr>

      <h2>Explanation</h2>

      HAPPY has two P's.

      <br><br>

      Therefore:

      <div class="math-box">

        5! / 2!

        <br><br>

        = 120 / 2

        <br><br>

        = 60

      </div>
    `;
  }

  reasoningOutput.innerHTML = html;
}

</script>

</body>
</html>
