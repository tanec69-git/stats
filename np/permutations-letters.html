<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Permutation App with Repeated Letters</title>

  <style>

    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      margin:20px;
    }

    .container{
      max-width:1100px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
    }

    label{
      display:block;
      margin-top:15px;
      font-weight:bold;
    }

    input{
      width:100%;
      padding:10px;
      font-size:16px;
      margin-top:5px;
      box-sizing:border-box;
    }

    button{
      margin-top:20px;
      padding:12px 20px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

    .section{
      margin-top:25px;
      background:#fafafa;
      padding:15px;
      border-radius:10px;
      border:1px solid #ddd;
    }

    .output{
      max-height:500px;
      overflow-y:auto;
      white-space:pre-wrap;
      font-family:monospace;
      background:white;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    .formula{
      line-height:1.8;
      font-size:17px;
    }

    .warning{
      color:red;
      font-weight:bold;
      margin-top:10px;
    }

    table{
      border-collapse:collapse;
      width:100%;
      margin-top:10px;
    }

    td,th{
      border:1px solid #ccc;
      padding:8px;
      text-align:center;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>Permutation App (Repeated Letters Included)</h1>

  <label>Enter a Word</label>
  <input type="text" id="wordInput" placeholder="Example: STATISTICS">

  <label>Number of Letters to Permutate</label>
  <input type="number" id="lengthInput" min="1" value="3">

  <label>Maximum Number of Permutations to Display</label>
  <input type="number" id="maxDisplay" min="1" value="100">

  <button onclick="solve()">
    Generate Permutations
  </button>

  <div class="section">
    <h2>Letter Frequencies</h2>
    <div id="frequencyOutput"></div>
  </div>

  <div class="section">
    <h2>Mathematical Reasoning</h2>
    <div id="reasoningOutput" class="formula"></div>
  </div>

  <div class="section">
    <h2>Permutations</h2>
    <div id="stats"></div>
    <div id="warning" class="warning"></div>
    <div id="permutationOutput" class="output"></div>
  </div>

</div>

<script>

function factorial(n){

  let result = 1;

  for(let i=2;i<=n;i++){
    result *= i;
  }

  return result;
}

function getFrequencies(word){

  const freq = {};

  for(const letter of word){

    if(freq[letter]){
      freq[letter]++;
    }
    else{
      freq[letter] = 1;
    }
  }

  return freq;
}

function solve(){

  const word =
    document.getElementById("wordInput")
    .value
    .trim()
    .toUpperCase();

  const r =
    parseInt(
      document.getElementById("lengthInput").value
    );

  const maxDisplay =
    parseInt(
      document.getElementById("maxDisplay").value
    );

  const frequencyOutput =
    document.getElementById("frequencyOutput");

  const reasoningOutput =
    document.getElementById("reasoningOutput");

  const permutationOutput =
    document.getElementById("permutationOutput");

  const stats =
    document.getElementById("stats");

  const warning =
    document.getElementById("warning");

  frequencyOutput.innerHTML = "";
  reasoningOutput.innerHTML = "";
  permutationOutput.textContent = "";
  stats.textContent = "";
  warning.textContent = "";

  if(word.length === 0){
    warning.textContent = "Please enter a word.";
    return;
  }

  if(r > word.length){
    warning.textContent =
      "Permutation length cannot exceed word length.";
    return;
  }

  //-----------------------------------------
  // FREQUENCY TABLE
  //-----------------------------------------

  const frequencies = getFrequencies(word);

  let freqHTML =
    "<table><tr><th>Letter</th><th>Frequency</th></tr>";

  for(const letter in frequencies){

    freqHTML += `
      <tr>
        <td>${letter}</td>
        <td>${frequencies[letter]}</td>
      </tr>
    `;
  }

  freqHTML += "</table>";

  frequencyOutput.innerHTML = freqHTML;

  //-----------------------------------------
  // GENERATE UNIQUE PERMUTATIONS
  //-----------------------------------------

  const results = new Set();

  function backtrack(path, freqMap){

    if(results.size >= maxDisplay){
      return;
    }

    if(path.length === r){

      results.add(path);
      return;
    }

    for(const letter in freqMap){

      if(freqMap[letter] > 0){

        freqMap[letter]--;

        backtrack(path + letter, freqMap);

        freqMap[letter]++;
      }
    }
  }

  backtrack("", {...frequencies});

  //-----------------------------------------
  // DISPLAY PERMUTATIONS
  //-----------------------------------------

  const resultArray = Array.from(results);

  permutationOutput.textContent =
    resultArray.join("\n");

  stats.innerHTML =
    `<strong>Total Unique Permutations:</strong>
    ${resultArray.length}`;

  if(resultArray.length >= maxDisplay){

    warning.textContent =
      "Maximum display limit reached.";
  }

  //-----------------------------------------
  // MATHEMATICAL REASONING
  //-----------------------------------------

  let reasoningHTML = "";

  reasoningHTML += `
    <strong>Word:</strong> ${word}<br><br>

    We must account for repeated letters.<br><br>

    The app generates ONLY UNIQUE permutations.<br><br>

    <strong>Method Used:</strong><br>
    1. Count the frequency of each letter.<br>
    2. Build permutations one letter at a time.<br>
    3. A letter can only be used as many times as it appears.<br>
    4. Duplicate arrangements are automatically avoided.<br><br>
  `;

  //-----------------------------------------
  // SHOW FORMULA EXPLANATION
  //-----------------------------------------

  reasoningHTML += `
    <strong>Permutation Formula with Repeated Letters:</strong><br><br>

    If all letters were different:<br><br>

    nPr = n! / (n-r)!<br><br>

    However, when letters repeat, we divide by
    repeated factorials to avoid overcounting.<br><br>

    General Formula:<br><br>

    Total Unique Permutations =
    n! / (a! × b! × c! ...)<br><br>

    where a, b, c are repeated letter counts.<br><br>
  `;

  //-----------------------------------------
  // SPECIAL CASE EXAMPLE
  //-----------------------------------------

  if(word === "STATISTICS" && r === 3){

    reasoningHTML += `
      <hr>

      <h3>Worked Example: STATISTICS (3-letter permutations)</h3>

      STATISTICS contains:<br><br>

      S = 3<br>
      T = 3<br>
      I = 2<br>
      A = 1<br>
      C = 1<br><br>

      <strong>Case 1: All letters different</strong><br><br>

      Choose 3 different letters from 5 distinct letters:<br><br>

      5C3 = 10 selections<br><br>

      Each selection can be arranged in:<br><br>

      3! = 6 ways<br><br>

      Total:<br><br>

      10 × 6 = 60<br><br>

      <strong>Case 2: One repeated letter</strong><br><br>

      Possible repeated letters:<br>
      S, T, I<br><br>

      Example: S S A<br><br>

      Number of arrangements:<br><br>

      3! / 2! = 3<br><br>

      Repeated S gives:<br>

      4 choices for the remaining letter × 3 arrangements<br>

      = 12<br><br>

      Repeated T gives 12<br><br>

      Repeated I gives 12<br><br>

      Total for Case 2:<br><br>

      12 + 12 + 12 = 36<br><br>

      <strong>Case 3: All letters identical</strong><br><br>

      SSS and TTT<br><br>

      Total = 2<br><br>

      <strong>Final Total:</strong><br><br>

      60 + 36 + 2 = 98
    `;
  }

  reasoningOutput.innerHTML = reasoningHTML;
}

</script>

</body>
</html>
