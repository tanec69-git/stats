<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Word Permutation App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f4f4f4;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
    }

    button:hover {
      background: #0056b3;
    }

    .results {
      margin-top: 25px;
    }

    .stats {
      margin-bottom: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    .section {
      margin-top: 25px;
      padding: 15px;
      background: #fafafa;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .permutation-list {
      max-height: 500px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: monospace;
      background: white;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .warning {
      color: red;
      margin-top: 10px;
      font-weight: bold;
    }

    .formula {
      font-size: 18px;
      margin-top: 10px;
      line-height: 1.8;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>Word Permutation App</h1>

  <label for="wordInput">Enter a Word</label>
  <input type="text" id="wordInput" placeholder="Example: STATISTICS">

  <label for="lengthInput">Number of Letters to Permutate</label>
  <input type="number" id="lengthInput" min="1" value="3">

  <label for="maxDisplay">Maximum Number of Permutations to Display</label>
  <input type="number" id="maxDisplay" min="1" value="100">

  <button onclick="generatePermutations()">
    Generate Permutations
  </button>

  <div class="results">

    <div class="section">
      <h2>Mathematical Calculations</h2>
      <div id="mathOutput" class="formula"></div>
    </div>

    <div class="section">
      <h2>Permutation Results</h2>
      <div class="stats" id="stats"></div>
      <div class="warning" id="warning"></div>
      <div class="permutation-list" id="output"></div>
    </div>

  </div>

</div>

<script>

  function factorial(n) {
    let result = 1;

    for (let i = 2; i <= n; i++) {
      result *= i;
    }

    return result;
  }

  function generatePermutations() {

    const word =
      document.getElementById("wordInput")
      .value
      .trim()
      .toUpperCase();

    const length =
      parseInt(
        document.getElementById("lengthInput").value
      );

    const maxDisplay =
      parseInt(
        document.getElementById("maxDisplay").value
      );

    const output =
      document.getElementById("output");

    const stats =
      document.getElementById("stats");

    const warning =
      document.getElementById("warning");

    const mathOutput =
      document.getElementById("mathOutput");

    output.textContent = "";
    stats.textContent = "";
    warning.textContent = "";
    mathOutput.innerHTML = "";

    if (word.length === 0) {
      warning.textContent =
        "Please enter a word.";
      return;
    }

    if (length > word.length) {
      warning.textContent =
        "Permutation length cannot exceed word length.";
      return;
    }

    const n = word.length;
    const r = length;

    // nPr formula
    const numerator = factorial(n);
    const denominator = factorial(n - r);
    const totalPermutations =
      numerator / denominator;

    // Display mathematics
    mathOutput.innerHTML = `
      <strong>Word:</strong> ${word}<br><br>

      <strong>Total letters (n):</strong> ${n}<br>
      <strong>Letters selected (r):</strong> ${r}<br><br>

      <strong>Permutation Formula:</strong><br>
      nPr = n! / (n - r)!<br><br>

      ${n}P${r} = ${n}! / (${n} - ${r})!<br><br>

      = ${n}! / ${n-r}!<br><br>

      = ${numerator} / ${denominator}<br><br>

      = <strong>${totalPermutations}</strong>
    `;

    let results = new Set();

    function permute(path, remaining) {

      if (results.size >= maxDisplay) return;

      if (path.length === length) {
        results.add(path);
        return;
      }

      for (let i = 0; i < remaining.length; i++) {

        if (results.size >= maxDisplay) return;

        const next =
          remaining.slice(0, i) +
          remaining.slice(i + 1);

        permute(path + remaining[i], next);
      }
    }

    permute("", word);

    const resultArray = Array.from(results);

    stats.textContent =
      "Displayed " +
      resultArray.length +
      " permutation(s)";

    output.textContent =
      resultArray.join("\n");

    if (resultArray.length >= maxDisplay) {
      warning.textContent =
        "Maximum display limit reached.";
    }
  }

</script>

</body>
</html>
