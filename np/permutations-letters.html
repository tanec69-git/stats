<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Permutation App with Repeated Letters</title>

  <style>

    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      margin:20px;
    }

    .container{
      max-width:1100px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
    }

    label{
      display:block;
      margin-top:15px;
      font-weight:bold;
    }

    input{
      width:100%;
      padding:10px;
      font-size:16px;
      margin-top:5px;
      box-sizing:border-box;
    }

    button{
      margin-top:20px;
      padding:12px 20px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

    .section{
      margin-top:25px;
      background:#fafafa;
      padding:15px;
      border-radius:10px;
      border:1px solid #ddd;
    }

    .output{
      max-height:500px;
      overflow-y:auto;
      white-space:pre-wrap;
      font-family:monospace;
      background:white;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    .formula{
      line-height:1.9;
      font-size:18px;
    }

    .warning{
      color:red;
      font-weight:bold;
      margin-top:10px;
    }

    table{
      border-collapse:collapse;
      width:100%;
      margin-top:10px;
    }

    td,th{
      border:1px solid #ccc;
      padding:8px;
      text-align:center;
    }

    .math-box{
      background:white;
      padding:15px;
      border-radius:10px;
      border:1px solid #ccc;
      margin-top:15px;
      overflow-x:auto;
    }

    .final-answer{
      font-size:30px;
      font-weight:bold;
      color:green;
      margin-top:20px;
      padding:15px;
      background:#eefbea;
      border-radius:10px;
      border:2px solid green;
      text-align:center;
    }

    .case-title{
      color:#0056b3;
      font-size:22px;
      margin-top:20px;
      font-weight:bold;
    }

  </style>

</head>
<body>

<div class="container">

  <h1>Permutation App (Repeated Letters Included)</h1>

  <label>Enter a Word</label>
  <input type="text" id="wordInput" placeholder="Example: STATISTICS">

  <label>Number of Letters to Permutate</label>
  <input type="number" id="lengthInput" min="1" value="3">

  <label>Maximum Number of Permutations to Display</label>
  <input type="number" id="maxDisplay" min="1" value="100">

  <button onclick="solve()">
    Generate Permutations
  </button>

  <div class="section">

    <h2>Letter Frequencies</h2>

    <div id="frequencyOutput"></div>

  </div>

  <div class="section">

    <h2>Mathematical Working</h2>

    <div id="reasoningOutput" class="formula"></div>

  </div>

  <div class="section">

    <h2>Permutations</h2>

    <div id="stats"></div>

    <div id="warning" class="warning"></div>

    <div id="permutationOutput" class="output"></div>

  </div>

</div>

<script>

function factorial(n){

  let result = 1;

  for(let i = 2; i <= n; i++){

    result *= i;
  }

  return result;
}

function combination(n,r){

  return factorial(n) /
    (factorial(r) * factorial(n-r));
}

function getFrequencies(word){

  const freq = {};

  for(const letter of word){

    if(freq[letter]){

      freq[letter]++;

    }else{

      freq[letter] = 1;
    }
  }

  return freq;
}

function solve(){

  const word =
    document.getElementById("wordInput")
    .value
    .trim()
    .toUpperCase();

  const r =
    parseInt(
      document.getElementById("lengthInput").value
    );

  const maxDisplay =
    parseInt(
      document.getElementById("maxDisplay").value
    );

  const frequencyOutput =
    document.getElementById("frequencyOutput");

  const reasoningOutput =
    document.getElementById("reasoningOutput");

  const permutationOutput =
    document.getElementById("permutationOutput");

  const stats =
    document.getElementById("stats");

  const warning =
    document.getElementById("warning");

  frequencyOutput.innerHTML = "";
  reasoningOutput.innerHTML = "";
  permutationOutput.textContent = "";
  stats.textContent = "";
  warning.textContent = "";

  if(word.length === 0){

    warning.textContent =
      "Please enter a word.";

    return;
  }

  if(r > word.length){

    warning.textContent =
      "Permutation length cannot exceed word length.";

    return;
  }

  //-----------------------------------
  // LETTER FREQUENCIES
  //-----------------------------------

  const frequencies =
    getFrequencies(word);

  let freqHTML =
    "<table><tr><th>Letter</th><th>Frequency</th></tr>";

  for(const letter in frequencies){

    freqHTML += `
      <tr>
        <td>${letter}</td>
        <td>${frequencies[letter]}</td>
      </tr>
    `;
  }

  freqHTML += "</table>";

  frequencyOutput.innerHTML =
    freqHTML;

  //-----------------------------------
  // GENERATE UNIQUE PERMUTATIONS
  //-----------------------------------

  const results = new Set();

  function backtrack(path, freqMap){

    if(results.size >= maxDisplay){
      return;
    }

    if(path.length === r){

      results.add(path);

      return;
    }

    for(const letter in freqMap){

      if(freqMap[letter] > 0){

        freqMap[letter]--;

        backtrack(path + letter, freqMap);

        freqMap[letter]++;
      }
    }
  }

  backtrack("", {...frequencies});

  const resultArray =
    Array.from(results);

  //-----------------------------------
  // DISPLAY PERMUTATIONS
  //-----------------------------------

  permutationOutput.textContent =
    resultArray.join("\n");

  stats.innerHTML =
    `<strong>Displayed Permutations:</strong>
    ${resultArray.length}`;

  if(resultArray.length >= maxDisplay){

    warning.textContent =
      "Maximum display limit reached.";
  }

  //-----------------------------------
  // MATHEMATICAL REASONING
  //-----------------------------------

  let html = "";

  html += `

    We must account for repeated letters
    so that duplicate arrangements are
    NOT counted more than once.

    <div class="math-box">

      <strong>General Formula for Permutations with Repeated Letters</strong>

      <br><br>

      Unique permutations =
      n! / (a! × b! × c! ...)

      <br><br>

      where:

      <br><br>

      n = total letters

      <br><br>

      a,b,c = repeated letter frequencies

    </div>
  `;

  //-----------------------------------
  // SPECIAL WORKED EXAMPLE
  //-----------------------------------

  if(word === "STATISTICS" && r === 3){

    //-----------------------------------
    // CASE 1
    //-----------------------------------

    const case1Choices =
      combination(5,3);

    const case1Arrangements =
      factorial(3);

    const case1 =
      case1Choices *
      case1Arrangements;

    //-----------------------------------
    // CASE 2
    //-----------------------------------

    const repeatedArrangement =
      factorial(3) / factorial(2);

    const repeatedCases =
      4 * repeatedArrangement;

    const case2 =
      repeatedCases * 3;

    //-----------------------------------
    // CASE 3
    //-----------------------------------

    const case3 = 2;

    //-----------------------------------
    // TOTAL
    //-----------------------------------

    const total =
      case1 + case2 + case3;

    html += `

      <hr>

      <h2>Specific Equation for this Problem</h2>

      We split the problem into cases.

      <div class="math-box">

        Total permutations

        <br><br>

        =

        (5C3 × 3!)

        +

        [3 × (4 × (3!/2!))]

        +

        2

      </div>

      <br>

      Substituting the values:

      <div class="math-box">

        =

        (10 × 6)

        +

        [3 × (4 × 3)]

        +

        2

        <br><br>

        =

        60 + 36 + 2

        <br><br>

        =

        98

      </div>

      <div class="case-title">
        Case 1: All Letters Different
      </div>

      Distinct letters are:

      <br><br>

      {S, T, I, A, C}

      <br><br>

      Choose 3 different letters:

      <div class="math-box">

        5C3

        <br><br>

        = 5! / (3! × 2!)

        <br><br>

        = 120 / (6 × 2)

        <br><br>

        = 10

      </div>

      Arrange each selection:

      <div class="math-box">

        3! = 6

      </div>

      Therefore:

      <div class="math-box">

        10 × 6 = 60

      </div>

      <div class="case-title">
        Case 2: One Repeated Letter
      </div>

      Possible repeated letters:

      <br><br>

      S, T, I

      <br><br>

      Example arrangement:

      <br><br>

      S S A

      <div class="math-box">

        Number of arrangements

        <br><br>

        = 3! / 2!

        <br><br>

        = 6 / 2

        <br><br>

        = 3

      </div>

      There are 4 choices for the remaining letter.

      <div class="math-box">

        4 × 3 = 12

      </div>

      Since there are 3 repeated-letter groups:

      <div class="math-box">

        12 + 12 + 12 = 36

      </div>

      <div class="case-title">
        Case 3: All Letters Identical
      </div>

      Possible arrangements:

      <br><br>

      SSS

      <br>

      TTT

      <div class="math-box">

        Total = 2

      </div>

      <div class="final-answer">

        Final Answer

        <br><br>

        98 Unique 3-Letter Permutations

      </div>
    `;
  }
  else{

    html += `

      <hr>

      <h2>Specific Equation for this Problem</h2>

      <div class="math-box">

        Total Unique Permutations

        <br><br>

        = ${resultArray.length}

      </div>

      <div class="final-answer">

        Final Answer

        <br><br>

        ${resultArray.length} Unique Permutations

      </div>
    `;
  }

  reasoningOutput.innerHTML = html;
}

</script>

</body>
</html>
