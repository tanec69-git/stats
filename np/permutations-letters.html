<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Permutation App with Repeated Letters</title>

  <style>

    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      margin:20px;
    }

    .container{
      max-width:1100px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
    }

    label{
      display:block;
      margin-top:15px;
      font-weight:bold;
    }

    input{
      width:100%;
      padding:10px;
      font-size:16px;
      margin-top:5px;
      box-sizing:border-box;
    }

    button{
      margin-top:20px;
      padding:12px 20px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

    .section{
      margin-top:25px;
      background:#fafafa;
      padding:15px;
      border-radius:10px;
      border:1px solid #ddd;
    }

    .output{
      max-height:500px;
      overflow-y:auto;
      white-space:pre-wrap;
      font-family:monospace;
      background:white;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    .formula{
      line-height:1.9;
      font-size:17px;
    }

    .warning{
      color:red;
      font-weight:bold;
      margin-top:10px;
    }

    table{
      border-collapse:collapse;
      width:100%;
      margin-top:10px;
    }

    td,th{
      border:1px solid #ccc;
      padding:8px;
      text-align:center;
    }

    .final-answer{
      font-size:28px;
      font-weight:bold;
      color:green;
      margin-top:20px;
      padding:15px;
      background:#eefbea;
      border-radius:10px;
      border:2px solid green;
    }

  </style>

</head>
<body>

<div class="container">

  <h1>Permutation App (Repeated Letters Included)</h1>

  <label>Enter a Word</label>
  <input type="text" id="wordInput" placeholder="Example: STATISTICS">

  <label>Number of Letters to Permutate</label>
  <input type="number" id="lengthInput" min="1" value="3">

  <label>Maximum Number of Permutations to Display</label>
  <input type="number" id="maxDisplay" min="1" value="100">

  <button onclick="solve()">
    Generate Permutations
  </button>

  <div class="section">
    <h2>Letter Frequencies</h2>
    <div id="frequencyOutput"></div>
  </div>

  <div class="section">
    <h2>Mathematical Working</h2>
    <div id="reasoningOutput" class="formula"></div>
  </div>

  <div class="section">
    <h2>Permutations</h2>
    <div id="stats"></div>
    <div id="warning" class="warning"></div>
    <div id="permutationOutput" class="output"></div>
  </div>

</div>

<script>

function factorial(n){

  let result = 1;

  for(let i=2;i<=n;i++){
    result *= i;
  }

  return result;
}

function getFrequencies(word){

  const freq = {};

  for(const letter of word){

    if(freq[letter]){
      freq[letter]++;
    }
    else{
      freq[letter] = 1;
    }
  }

  return freq;
}

function combination(n,r){

  return factorial(n) /
    (factorial(r) * factorial(n-r));
}

function solve(){

  const word =
    document.getElementById("wordInput")
    .value
    .trim()
    .toUpperCase();

  const r =
    parseInt(
      document.getElementById("lengthInput").value
    );

  const maxDisplay =
    parseInt(
      document.getElementById("maxDisplay").value
    );

  const frequencyOutput =
    document.getElementById("frequencyOutput");

  const reasoningOutput =
    document.getElementById("reasoningOutput");

  const permutationOutput =
    document.getElementById("permutationOutput");

  const stats =
    document.getElementById("stats");

  const warning =
    document.getElementById("warning");

  frequencyOutput.innerHTML = "";
  reasoningOutput.innerHTML = "";
  permutationOutput.textContent = "";
  stats.textContent = "";
  warning.textContent = "";

  if(word.length === 0){

    warning.textContent =
      "Please enter a word.";

    return;
  }

  if(r > word.length){

    warning.textContent =
      "Permutation length cannot exceed word length.";

    return;
  }

  //-------------------------------------
  // FREQUENCIES
  //-------------------------------------

  const frequencies = getFrequencies(word);

  let freqHTML =
    "<table><tr><th>Letter</th><th>Frequency</th></tr>";

  for(const letter in frequencies){

    freqHTML += `
      <tr>
        <td>${letter}</td>
        <td>${frequencies[letter]}</td>
      </tr>
    `;
  }

  freqHTML += "</table>";

  frequencyOutput.innerHTML = freqHTML;

  //-------------------------------------
  // UNIQUE PERMUTATIONS
  //-------------------------------------

  const results = new Set();

  function backtrack(path, freqMap){

    if(results.size >= maxDisplay){
      return;
    }

    if(path.length === r){

      results.add(path);
      return;
    }

    for(const letter in freqMap){

      if(freqMap[letter] > 0){

        freqMap[letter]--;

        backtrack(path + letter, freqMap);

        freqMap[letter]++;
      }
    }
  }

  backtrack("", {...frequencies});

  const resultArray = Array.from(results);

  //-------------------------------------
  // DISPLAY PERMUTATIONS
  //-------------------------------------

  permutationOutput.textContent =
    resultArray.join("\n");

  stats.innerHTML =
    `<strong>Displayed Permutations:</strong>
    ${resultArray.length}`;

  if(resultArray.length >= maxDisplay){

    warning.textContent =
      "Maximum display limit reached.";
  }

  //-------------------------------------
  // MATHEMATICAL REASONING
  //-------------------------------------

  let reasoningHTML = "";

  reasoningHTML += `
    <strong>Word:</strong> ${word}<br><br>

    We must account for repeated letters
    to avoid overcounting duplicate arrangements.<br><br>

    <strong>General Formula:</strong><br><br>

    Unique permutations =
    \\( \\frac{n!}{a!b!c!...} \\)<br><br>

    where:<br>

    n = total letters<br>

    a,b,c = repeated letter frequencies<br><br>
  `;

  //-------------------------------------
  // SPECIAL EXAMPLE
  //-------------------------------------

  if(word === "STATISTICS" && r === 3){

    const case1 = 60;
    const case2 = 36;
    const case3 = 2;

    const total =
      case1 + case2 + case3;

    reasoningHTML += `

      <hr>

      <h2>Worked Example</h2>

      <strong>STATISTICS</strong> contains:<br><br>

      S = 3<br>
      T = 3<br>
      I = 2<br>
      A = 1<br>
      C = 1<br><br>

      We count all possible 3-letter arrangements
      systematically.<br><br>

      <h3>Case 1: All 3 letters different</h3>

      Distinct letters are:<br><br>

      {S, T, I, A, C}<br><br>

      Number of ways to choose 3 distinct letters:<br><br>

      5C3 =
      5! / (3! × 2!)<br><br>

      =
      120 / (6 × 2)<br><br>

      = 10 choices<br><br>

      Each choice can be arranged in:<br><br>

      3! = 6 ways<br><br>

      Therefore:<br><br>

      10 × 6 = ${case1}<br><br>

      <h3>Case 2: One repeated letter</h3>

      Possible repeated letters are:<br><br>

      S, T, I<br><br>

      Example arrangement:<br><br>

      S S A<br><br>

      Formula:<br><br>

      3! / 2!<br><br>

      = 6 / 2<br><br>

      = 3 arrangements<br><br>

      Repeated S:<br><br>

      4 choices for remaining letter × 3 arrangements<br><br>

      = 12<br><br>

      Repeated T:<br><br>

      = 12<br><br>

      Repeated I:<br><br>

      = 12<br><br>

      Total for Case 2:<br><br>

      12 + 12 + 12 = ${case2}<br><br>

      <h3>Case 3: All letters identical</h3>

      Possible arrangements:<br><br>

      SSS<br>
      TTT<br><br>

      Total = ${case3}<br><br>

      <h2>Final Answer</h2>

      ${case1} + ${case2} + ${case3}
      = ${total}

      <div class="final-answer">
        Total Number of Unique 3-Letter Permutations
        = ${total}
      </div>
    `;
  }
  else{

    reasoningHTML += `

      <hr>

      <h2>Final Answer</h2>

      The app generated all unique permutations
      while accounting for repeated letters.

      <div class="final-answer">
        Total Unique Permutations
        = ${resultArray.length}
      </div>
    `;
  }

  reasoningOutput.innerHTML = reasoningHTML;
}

</script>

</body>
</html>
