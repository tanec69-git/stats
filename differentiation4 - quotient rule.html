<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Quotient Rule Generator</title>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(','\\)']],
        displayMath: [['\\[','\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <style>

    body{
      margin:0;
      padding:20px;
      font-family:Arial, sans-serif;
      background:#f4f6f9;
      display:flex;
      justify-content:center;
    }

    .container{
      width:1000px;
      max-width:95%;
      background:white;
      padding:30px;
      border-radius:18px;
      box-shadow:0 6px 18px rgba(0,0,0,0.15);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#222;
    }

    .card{
      background:#fafafa;
      border:1px solid #ddd;
      border-radius:14px;
      padding:20px;
      margin-top:20px;
    }

    .label{
      font-size:22px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .math{
      font-size:30px;
      margin:18px 0;
      overflow-x:auto;
    }

    .solution{
      font-size:20px;
      line-height:1.9;
    }

    .step{
      margin-top:15px;
    }

    .answer{
      margin-top:20px;
      background:#e0f2fe;
      padding:18px;
      border-radius:12px;
      font-weight:bold;
    }

    button{
      background:#2563eb;
      color:white;
      border:none;
      padding:14px 22px;
      border-radius:12px;
      font-size:18px;
      cursor:pointer;
      margin-right:10px;
      margin-top:10px;
      transition:0.2s;
    }

    button:hover{
      background:#1d4ed8;
      transform:scale(1.03);
    }

    .hidden{
      display:none;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>Quotient Rule Generator</h1>

  <button onclick="generateProblem()">Generate Problem</button>
  <button onclick="toggleSolution()">Show / Hide Solution</button>

  <div class="card">
    <div class="label">Generated Question</div>
    <div id="question" class="math"></div>
  </div>

  <div id="solutionCard" class="card hidden">
    <div class="label">Solution</div>
    <div id="solution" class="solution"></div>
  </div>

</div>

<script>

function randInt(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

// Removes coefficient 1 from expressions
function coefficientString(coefficient, variable="x"){

  if(coefficient === 1){
    return variable;
  }

  return `${coefficient}${variable}`;
}

// Removes coefficient 1 from exponential expressions
function expString(coefficient){

  if(coefficient === 1){
    return "x";
  }

  return `${coefficient}x`;
}

function generateProblem(){

  const type = randInt(1,4);

  let questionLatex = "";
  let solutionLatex = "";

  // =====================================================
  // TYPE 1
  // Polynomial over Exponential
  // =====================================================

  if(type === 1){

    const a = randInt(2,6);
    const power = randInt(2,5);
    const b = randInt(1,5);

    const exponent = expString(b);

    questionLatex =
      `f(x)=\\frac{${a}x^{${power}}}{e^{${exponent}}}`;

    solutionLatex = `

      <div class="step">
      Let
      \\[
      u=${a}x^{${power}}
      \\]
      and
      \\[
      v=e^{${exponent}}
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{du}{dx}
      =
      ${a*power}x^{${power-1}}
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{dv}{dx}
      =
      ${b === 1 ? "" : b}e^{${exponent}}
      \\]
      </div>

      <div class="step">
      Apply the quotient rule:
      </div>

      <div class="math">
      \\[
      \\frac{d}{dx}
      \\left(
      \\frac{u}{v}
      \\right)
      =
      \\frac{
      v\\frac{du}{dx}
      -
      u\\frac{dv}{dx}
      }{
      v^2
      }
      \\]
      </div>

      <div class="answer">

      Step 1:

      <div class="math">
      \\[
      f'(x)
      =
      \\frac{
      (e^{${exponent}})
      (${a*power}x^{${power-1}})
      -
      (${a}x^{${power}})
      (${b === 1 ? "" : b}e^{${exponent}})
      }{
      (e^{${exponent}})^2
      }
      \\]
      </div>

      Step 2: Simplify

      <div class="math">
      \\[
      f'(x)
      =
      \\frac{
      ${a*power}x^{${power-1}}e^{${exponent}}
      -
      ${a*b === 1 ? "" : a*b}x^{${power}}e^{${exponent}}
      }{
      e^{${2*b}x}
      }
      \\]
      </div>

      </div>
    `;
  }

  // =====================================================
  // TYPE 2
  // Polynomial over ln(x)
  // =====================================================

  else if(type === 2){

    const a = randInt(2,6);
    const power = randInt(2,5);
    const b = randInt(1,5);

    questionLatex =
      `f(x)=\\frac{${a}x^{${power}}}{\\ln(${coefficientString(b)})}`;

    solutionLatex = `

      <div class="step">
      Let
      \\[
      u=${a}x^{${power}}
      \\]
      and
      \\[
      v=\\ln(${coefficientString(b)})
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{du}{dx}
      =
      ${a*power}x^{${power-1}}
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{dv}{dx}
      =
      \\frac{1}{x}
      \\]
      </div>

      <div class="step">
      Apply the quotient rule:
      </div>

      <div class="math">
      \\[
      \\frac{d}{dx}
      \\left(
      \\frac{u}{v}
      \\right)
      =
      \\frac{
      v\\frac{du}{dx}
      -
      u\\frac{dv}{dx}
      }{
      v^2
      }
      \\]
      </div>

      <div class="answer">

      Step 1:

      <div class="math">
      \\[
      f'(x)
      =
      \\frac{
      (\\ln(${coefficientString(b)}))
      (${a*power}x^{${power-1}})
      -
      (${a}x^{${power}})
      \\left(
      \\frac{1}{x}
      \\right)
      }{
      (\\ln(${coefficientString(b)}))^2
      }
      \\]
      </div>

      Step 2: Simplify

      <div class="math">
      \\[
      f'(x)
      =
      \\frac{
      ${a*power}x^{${power-1}}
      \\ln(${coefficientString(b)})
      -
      ${a}x^{${power-1}}
      }{
      (\\ln(${coefficientString(b)}))^2
      }
      \\]
      </div>

      </div>
    `;
  }

  // =====================================================
  // TYPE 3
  // Exponential over Polynomial
  // =====================================================

  else if(type === 3){

    const a = randInt(1,5);
    const b = randInt(2,6);
    const power = randInt(2,5);

    const exponent = expString(a);

    questionLatex =
      `f(x)=\\frac{e^{${exponent}}}{${b}x^{${power}}}`;

    solutionLatex = `

      <div class="step">
      Let
      \\[
      u=e^{${exponent}}
      \\]
      and
      \\[
      v=${b}x^{${power}}
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{du}{dx}
      =
      ${a === 1 ? "" : a}e^{${exponent}}
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{dv}{dx}
      =
      ${b*power}x^{${power-1}}
      \\]
      </div>

      <div class="step">
      Apply the quotient rule:
      </div>

      <div class="math">
      \\[
      \\frac{d}{dx}
      \\left(
      \\frac{u}{v}
      \\right)
      =
      \\frac{
      v\\frac{du}{dx}
      -
      u\\frac{dv}{dx}
      }{
      v^2
      }
      \\]
      </div>

      <div class="answer">

      Step 1:

      <div class="math">
      \\[
      f'(x)
      =
      \\frac{
      (${b}x^{${power}})
      (${a === 1 ? "" : a}e^{${exponent}})
      -
      (e^{${exponent}})
      (${b*power}x^{${power-1}})
      }{
      (${b}x^{${power}})^2
      }
      \\]
      </div>

      Step 2: Simplify

      <div class="math">
      \\[
      f'(x)
      =
      \\frac{
      ${a*b === 1 ? "" : a*b}x^{${power}}e^{${exponent}}
      -
      ${b*power}x^{${power-1}}e^{${exponent}}
      }{
      ${b*b}x^{${2*power}}
      }
      \\]
      </div>

      </div>
    `;
  }

  // =====================================================
  // TYPE 4
  // ln(x) over Polynomial
  // =====================================================

  else{

    const a = randInt(1,5);
    const b = randInt(2,6);
    const power = randInt(2,5);

    questionLatex =
      `f(x)=\\frac{\\ln(${coefficientString(a)})}{${b}x^{${power}}}`;

    solutionLatex = `

      <div class="step">
      Let
      \\[
      u=\\ln(${coefficientString(a)})
      \\]
      and
      \\[
      v=${b}x^{${power}}
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{du}{dx}
      =
      \\frac{1}{x}
      \\]
      </div>

      <div class="math">
      \\[
      \\frac{dv}{dx}
      =
      ${b*power}x^{${power-1}}
      \\]
      </div>

      <div class="step">
      Apply the quotient rule:
      </div>

      <div class="math">
      \\[
      \\frac{d}{dx}
      \\left(
      \\frac{u}{v}
      \\right)
      =
      \\frac{
      v\\frac{du}{dx}
      -
      u\\frac{dv}{dx}
      }{
      v^2
      }
      \\]
      </div>

      <div class="answer">

      Step 1:

      <div class="math">
      \\[
      f'(x)
      =
      \\frac{
      (${b}x^{${power}})
      \\left(
      \\frac{1}{x}
      \\right)
      -
      (\\ln(${coefficientString(a)}))
      (${b*power}x^{${power-1}})
      }{
      (${b}x^{${power}})^2
      }
      \\]
      </div>

      Step 2: Simplify

      <div class="math">
      \\[
      f'(x)
      =
      \\frac{
      ${b}x^{${power-1}}
      -
      ${b*power}x^{${power-1}}
      \\ln(${coefficientString(a)})
      }{
      ${b*b}x^{${2*power}}
      }
      \\]
      </div>

      </div>
    `;
  }

  document.getElementById("question").innerHTML =
    `\\[ ${questionLatex} \\]`;

  document.getElementById("solution").innerHTML =
    solutionLatex;

  document.getElementById("solutionCard")
    .classList.add("hidden");

  MathJax.typesetPromise();
}

function toggleSolution(){

  document.getElementById("solutionCard")
    .classList.toggle("hidden");

  MathJax.typesetPromise();
}

generateProblem();

</script>

</body>
</html>
