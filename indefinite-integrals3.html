<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>U-Substitution Integration App</title>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(','\\)']],
        displayMath: [['\\[','\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>

  <script defer
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
  </script>

  <style>

    body{
      margin:0;
      padding:30px;
      background:#f4f7fb;
      font-family:Arial, sans-serif;
      display:flex;
      justify-content:center;
    }

    .container{
      width:1000px;
      max-width:100%;
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 6px 20px rgba(0,0,0,0.12);
    }

    h1{
      text-align:center;
      color:#1d4ed8;
      margin-bottom:10px;
    }

    .subtitle{
      text-align:center;
      color:#666;
      margin-bottom:30px;
    }

    .question-box{
      background:#eef4ff;
      border-left:8px solid #2563eb;
      border-radius:15px;
      padding:25px;
      text-align:center;
      font-size:30px;
      min-height:90px;
      margin-bottom:25px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
      margin-bottom:25px;
    }

    button{
      padding:14px 24px;
      border:none;
      border-radius:12px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    .generate-btn{
      background:#2563eb;
      color:white;
    }

    .generate-btn:hover{
      background:#1d4ed8;
    }

    .solution-btn{
      background:#16a34a;
      color:white;
    }

    .solution-btn:hover{
      background:#15803d;
    }

    .solution-area{
      background:#fafafa;
      border:2px solid #ddd;
      border-radius:16px;
      padding:25px;
      min-height:150px;
    }

    .step{
      margin-bottom:40px;
      line-height:2.2;
      font-size:24px;
    }

    .step-title{
      color:#1d4ed8;
      font-weight:bold;
      margin-bottom:10px;
    }

    .final-answer{
      background:#fef9c3;
      border-left:8px solid #eab308;
      border-radius:14px;
      padding:20px;
      font-size:26px;
      margin-top:20px;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>U-Substitution Integration App</h1>

  <div class="subtitle">
    Practice integration using substitution
  </div>

  <div class="question-box" id="questionBox">
    Press Generate Question
  </div>

  <div class="buttons">

    <button class="generate-btn" onclick="generateQuestion()">
      Generate Question
    </button>

    <button class="solution-btn" onclick="showSolution()">
      Show Solution
    </button>

  </div>

  <div class="solution-area" id="solutionArea">
    Solution steps will appear here.
  </div>

</div>

<script>

let currentQuestion = null;

function randomInt(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function generateQuestion(){

  const outerCoefficient = randomInt(2,6);

  const innerPower = randomInt(2,5);

  const constant = randomInt(1,9);

  const exponent = randomInt(2,6);

  const derivativeCoefficient =
    outerCoefficient * innerPower;

  const question = `
    \\int
    ${derivativeCoefficient}x^{${innerPower-1}}
    (x^{${innerPower}} + ${constant})^{${exponent}}
    \\,dx
  `;

  currentQuestion = {
    outerCoefficient,
    innerPower,
    constant,
    exponent,
    derivativeCoefficient,
    question
  };

  document.getElementById("questionBox").innerHTML =
    `\\(${question}\\)`;

  document.getElementById("solutionArea").innerHTML =
    "Solution steps will appear here.";

  MathJax.typesetPromise();
}

function showSolution(){

  if(!currentQuestion){
    return;
  }

  const k = currentQuestion.outerCoefficient;

  const p = currentQuestion.innerPower;

  const c = currentQuestion.constant;

  const n = currentQuestion.exponent;

  const d = currentQuestion.derivativeCoefficient;

  const newPower = n + 1;

  let html = "";

  // STEP 1

  html += `
    <div class="step">

      <div class="step-title">
        Step 1: Let u equal the bracket
      </div>

      \\[
      u = x^{${p}} + ${c}
      \\]

    </div>
  `;

  // STEP 2

  html += `
    <div class="step">

      <div class="step-title">
        Step 2: Differentiate u
      </div>

      \\[
      \\frac{du}{dx}
      =
      ${p}x^{${p-1}}
      \\]

      \\[
      du
      =
      ${p}x^{${p-1}}dx
      \\]

    </div>
  `;

  // STEP 3

  html += `
    <div class="step">

      <div class="step-title">
        Step 3: Rewrite the integral
      </div>

      \\[
      \\int
      ${d}x^{${p-1}}
      (x^{${p}} + ${c})^{${n}}
      \\,dx
      \\]

      \\[
      =
      ${k}
      \\int
      u^{${n}}
      \\,du
      \\]

    </div>
  `;

  // STEP 4

  html += `
    <div class="step">

      <div class="step-title">
        Step 4: Apply the Power Rule
      </div>

      \\[
      ${k}
      \\int
      u^{${n}}
      \\,du
      =
      ${k}
      \\left(
      \\frac{u^{${newPower}}}{${newPower}}
      \\right)
      + c
      \\]

    </div>
  `;

  // STEP 5

  html += `
    <div class="step">

      <div class="step-title">
        Step 5: Substitute back u = x^{${p}} + ${c}
      </div>

      \\[
      =
      \\frac{${k}(x^{${p}} + ${c})^{${newPower}}}
      {${newPower}}
      + c
      \\]

    </div>
  `;

  // FINAL ANSWER

  html += `
    <div class="final-answer">

      <strong>Final Answer</strong>

      \\[
      =
      \\frac{
      ${k}(x^{${p}} + ${c})^{${newPower}}
      }{
      ${newPower}
      }
      + c
      \\]

    </div>
  `;

  document.getElementById("solutionArea").innerHTML =
    html;

  MathJax.typesetPromise();
}

generateQuestion();

</script>

</body>
</html>
