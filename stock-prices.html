<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Interactive Stock Price Lab</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["matplotlib", "numpy", "pandas", "seaborn"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st
import pandas as pd
import numpy as np
import matplotlib.pyplot as plt
import seaborn as sns

st.set_page_config(page_title="Interactive Stock Analysis", layout="wide")

st.title("📈 Interactive Stock Price Lab")
st.write("Modify the data in the sidebar to see how statistics and visualizations change.")

# --- Sidebar Input ---
st.sidebar.header("Data Entry")
input_data = st.sidebar.text_input("Enter stock prices (comma separated):", "11, 12, 13, 16, 16, 17, 18, 21")

# Clean and convert input
try:
    data = [float(x.strip()) for x in input_data.split(",") if x.strip() != ""]
except ValueError:
    st.sidebar.error("Please enter valid numbers separated by commas.")
    data = [11, 12, 13, 16, 16, 17, 18, 21] # Fallback to original

if len(data) > 0:
    # --- Calculations ---
    mean_val = np.mean(data)
    median_val = np.median(data)
    q1 = np.percentile(data, 25)
    q3 = np.percentile(data, 75)
    std_dev = np.std(data)

    # --- Metrics ---
    m1, m2, m3, m4 = st.columns(4)
    m1.metric("Mean (μ)", f"{mean_val:.2f}")
    m2.metric("Median", f"{median_val:.1f}")
    m3.metric("Std Dev (σ)", f"{std_dev:.3f}")
    m4.metric("N (Count)", len(data))

    # --- Plots ---
    col1, col2 = st.columns(2)
    
    with col1:
        st.subheader("Distribution Density")
        fig1, ax1 = plt.subplots()
        sns.histplot(data, bins='auto', kde=True, ax=ax1, color='skyblue')
        ax1.axvline(mean_val, color='red', linestyle='--', label=f'Mean')
        ax1.axvline(median_val, color='green', linestyle='-', label=f'Median')
        ax1.legend()
        st.pyplot(fig1)

    with col2:
        st.subheader("Boxplot (Quartile Spread)")
        fig2, ax2 = plt.subplots()
        sns.boxplot(x=data, color='lightgreen', ax=ax2)
        sns.swarmplot(x=data, color='black', alpha=0.5, ax=ax2)
        st.pyplot(fig2)

    # --- Deviation Visualization ---
    st.divider()
    st.subheader("Visualizing Individual Deviations")
    fig3, ax3 = plt.subplots(figsize=(10, 3))
    deviations = [x - mean_val for x in data]
    colors = ['#EF5350' if x < 0 else '#42A5F5' for x in deviations]
    
    ax3.bar(range(len(data)), deviations, color=colors, alpha=0.7)
    ax3.axhline(0, color='black', linewidth=1)
    ax3.set_xticks(range(len(data)))
    ax3.set_xticklabels(data)
    ax3.set_ylabel("Deviation (X - μ)")
    st.pyplot(fig3)
    
    st.info("Change the numbers in the sidebar to see how outliers pull the mean away from the median.")
else:
    st.warning("Please enter at least one number.")
          `,
        },
      }, document.getElementById("root"));
    </script>
  </body>
</html>
