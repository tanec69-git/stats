<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>F-Distribution Visualizer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { 
      font-family: Arial; 
      margin: 0; 
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .controls {
      text-align: center;
      padding: 10px;
      background: #f5f5f5;
    }

    input, select { padding: 5px; margin: 5px; width: 100px; }

    .chart-container {
      flex: 1;
      position: relative;
      width: 100%;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .result { 
      text-align: center;
      font-size: 18px; 
      padding: 5px;
    }
  </style>
</head>
<body>

<div class="controls">
  <h2>F-Distribution Visualizer</h2>

  <label>df₁:</label>
  <input type="number" id="df1" value="5" min="1">

  <label>df₂:</label>
  <input type="number" id="df2" value="10" min="1">

  <label>Alpha:</label>
  <select id="alpha">
    <option value="0.05">0.05</option>
    <option value="0.01">0.01</option>
  </select>

  <label>Test Statistic:</label>
  <input type="number" id="testStat" value="2" step="0.1">

  <button onclick="updateChart()">Update</button>
</div>

<div id="decision" class="result"></div>

<div class="chart-container">
  <canvas id="fChart"></canvas>
</div>

<script>
function gamma(n) {
  if (n === 1) return 1;
  if (n === 0.5) return Math.sqrt(Math.PI);
  return (n - 1) * gamma(n - 1);
}

function beta(x, y) {
  return gamma(x) * gamma(y) / gamma(x + y);
}

function fPDF(x, d1, d2) {
  if (x <= 0) return 0;
  const num = Math.pow(d1/d2, d1/2) * Math.pow(x, d1/2 - 1);
  const denom = beta(d1/2, d2/2) * Math.pow(1 + (d1/d2)*x, (d1 + d2)/2);
  return num / denom;
}

function fCriticalValue(d1, d2, alpha) {
  let x = 0;
  let step = 0.01;
  let area = 0;

  while (area < 1 - alpha && x < 50) {
    area += fPDF(x, d1, d2) * step;
    x += step;
  }
  return x;
}

let chart;

function updateChart() {
  const d1 = parseFloat(document.getElementById('df1').value);
  const d2 = parseFloat(document.getElementById('df2').value);
  const alpha = parseFloat(document.getElementById('alpha').value);
  const testStat = parseFloat(document.getElementById('testStat').value);

  const critical = fCriticalValue(d1, d2, alpha);

  let pdfData = [];
  let rejectionShade = [];

  for (let x = 0; x <= 10; x += 0.05) {
    const y = fPDF(x, d1, d2);
    pdfData.push({x: x, y: y});
    rejectionShade.push(x >= critical ? {x: x, y: y} : {x: x, y: null});
  }

  let decisionText = '';
  if (testStat > critical) {
    decisionText = `Reject H₀ (test statistic ${testStat.toFixed(2)} > critical value ${critical.toFixed(2)})`;
  } else {
    decisionText = `Fail to Reject H₀ (test statistic ${testStat.toFixed(2)} ≤ critical value ${critical.toFixed(2)})`;
  }
  document.getElementById('decision').innerText = decisionText;

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('fChart'), {
    type: 'line',
    data: {
      datasets: [
        {
          label: `F PDF (df1=${d1}, df2=${d2})`,
          data: pdfData,
          borderWidth: 2,
          parsing: false
        },
        {
          label: 'Rejection Region',
          data: rejectionShade,
          borderWidth: 0,
          fill: true,
          backgroundColor: 'rgba(255,0,0,0.3)',
          parsing: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      parsing: false,
      scales: {
        x: {
          type: 'linear',
          title: { display: true, text: 'x' }
        },
        y: {
          title: { display: true, text: 'Density' }
        }
      }
    },
    plugins: [{
      id: 'verticalLines',
      afterDraw: (chart) => {
        const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;

        function drawLine(value, color, label) {
          const xPos = x.getPixelForValue(value);
          ctx.save();
          ctx.beginPath();
          ctx.moveTo(xPos, top);
          ctx.lineTo(xPos, bottom);
          ctx.lineWidth = 2;
          ctx.strokeStyle = color;
          ctx.stroke();

          ctx.fillStyle = color;
          ctx.font = '14px Arial';
          ctx.fillText(label + ' = ' + value.toFixed(2), xPos + 5, top + 15);
          ctx.restore();
        }

        drawLine(critical, 'red', 'Critical');
        drawLine(testStat, 'blue', 'Test');
      }
    }]
  });
}

updateChart();
</script>

</body>
</html>
